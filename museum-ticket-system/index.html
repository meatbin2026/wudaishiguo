<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>博物馆特展门票购买系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="noise"></div>
  <main class="layout">
    <section class="hero card">
      <p class="eyebrow">MUSEUM EXHIBITION</p>
      <h1>博物馆特展门票购买系统</h1>
      <p class="hero-desc">选择展览、日期与场次，实时查看余票并完成在线购票。系统会自动保存订单与库存数据。</p>
    </section>

    <section class="booking card">
      <h2>在线购票</h2>
      <form id="ticketForm" novalidate>
        <div class="grid-2">
          <label>
            选择特展
            <select id="exhibition"></select>
          </label>

          <label>
            参观日期
            <input id="visitDate" type="date" required />
          </label>

          <label>
            入场场次
            <select id="timeSlot"></select>
          </label>

          <div class="remain-box">
            <span class="remain-label">当前余票</span>
            <strong id="remaining">-</strong>
          </div>
        </div>

        <div class="qty-grid">
          <label>
            成人票（¥<span id="adultPrice"></span>）
            <input id="adultQty" type="number" min="0" max="10" value="1" />
          </label>
          <label>
            学生票（¥<span id="studentPrice"></span>）
            <input id="studentQty" type="number" min="0" max="10" value="0" />
          </label>
          <label>
            儿童票（¥<span id="childPrice"></span>）
            <input id="childQty" type="number" min="0" max="10" value="0" />
          </label>
        </div>

        <div class="grid-2">
          <label>
            购票人姓名
            <input id="buyerName" type="text" maxlength="20" placeholder="请输入真实姓名" required />
          </label>
          <label>
            手机号
            <input id="buyerPhone" type="tel" maxlength="11" placeholder="11位手机号" required />
          </label>
          <label class="full">
            邮箱（选填）
            <input id="buyerEmail" type="email" placeholder="example@mail.com" />
          </label>
        </div>

        <div class="summary">
          <div>
            <p>总张数：<strong id="totalCount">0</strong></p>
            <p>应付金额：<strong class="price" id="totalPrice">¥0</strong></p>
          </div>
          <button type="submit" class="btn">提交订单</button>
        </div>

        <p id="message" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section class="orders card">
      <div class="orders-head">
        <h2>我的订单</h2>
        <button id="clearOrders" type="button" class="btn btn-lite">清空记录</button>
      </div>
      <div id="ordersList" class="order-list"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
